# ─────────────────────────────────────────────────────────────────────────────
# SkillGap – Python project configuration
# Used by: ruff (linting), black (formatting), pytest (testing), coverage
# ─────────────────────────────────────────────────────────────────────────────

[tool.ruff]
# Target Python 3.11 as mandated by PRD §1
target-version = "py311"
line-length = 88

[tool.ruff.lint]
# Selective linting: E (errors), F (pyflakes), B (bugbear), S (security)
# We remove I (isort/sorting), UP (upgrades), ANN (annotations), and W (warnings)
# to keep CI focused on critical logic/security as per teacher's rubric.
select = ["E", "F", "B", "S"]
ignore = [
    "E501",   # line-length
    "B008",   # FastAPI Depends
    "B904",   # raise from err
    "S101",   # use of assert (common in our structure/tests)
    "S104",   # binding to 0.0.0.0
    "S105",   # hardcoded password
    "S106",   # hardcoded password
]

[tool.ruff.lint.per-file-ignores]
# Test files shouldn't fail on security warnings for dummy test data
"tests/**/*.py" = ["D", "S"]

# ─────────────────────────────────────────────────────────────────────────────
[tool.black]
target-version = ["py311"]
line-length = 88

# ─────────────────────────────────────────────────────────────────────────────
[tool.pytest.ini_options]
# Tell pytest where to look for tests
testpaths = ["tests"]
# Human-readable output + short summary for all failures
# -m 'not integration' excludes live-API tests from the normal CI run.
# To run integration tests locally: pytest -m integration
addopts = "-v --tb=short -q -m 'not integration'"
asyncio_mode = "auto"

# Register custom markers to avoid PytestUnknownMarkWarning
markers = [
    "integration: marks tests that call external services (excluded from CI)",
]

# ─────────────────────────────────────────────────────────────────────────────
[tool.coverage.run]
# Measure coverage for the server package itself, not tests or venv
source = ["."]
omit = [
    "tests/*",
    "venv/*",
    "*/migrations/*",
    "*/__pycache__/*",
    "*/alembic/*",
]

[tool.coverage.report]
# Matching the 80 % PRD requirement (§4)
fail_under = 80
show_missing = true
skip_covered = false
